# 外部 GitLab 版 docker-compose
#
# ローカル GitLab CE / GitLab Runner を含まず、外部の GitLab インスタンスを利用する構成。
# Docker / Podman 両対応（明示的ネットワーク定義）、プロキシ対応済み。
#
# 使用方法:
#   # Docker
#   docker compose -f docker-compose.external-gitlab.yml up -d --build
#   docker compose -f docker-compose.external-gitlab.yml down
#
#   # Podman
#   podman-compose -f docker-compose.external-gitlab.yml up -d --build
#   podman-compose -f docker-compose.external-gitlab.yml down
#
# 必要な .env 設定:
#   OPENAI_API_KEY, LITELLM_MASTER_KEY       (必須)
#   GITLAB_HOST, GITLAB_PERSONAL_ACCESS_TOKEN (外部 GitLab 接続用)
#   HTTP_PROXY, HTTPS_PROXY, NO_PROXY        (プロキシ環境の場合)

services:
  litellm:
    build:
      context: ./litellm
    ports:
      - "4000:4000"
    env_file:
      - .env
    networks:
      - default
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    # Proxy settings (uncomment if behind a corporate proxy)
    # NOTE: 大文字の HTTP_PROXY/HTTPS_PROXY/NO_PROXY は env_file (.env) 経由で
    # 自動的に読み込まれるため、ここでは小文字のみ追加する
    # environment:
    #   - http_proxy=${HTTP_PROXY:-}
    #   - https_proxy=${HTTPS_PROXY:-}
    #   - no_proxy=${NO_PROXY:-}

  dev:
    build:
      context: ./.devcontainer
      args:
        TZ: Asia/Tokyo
        CLAUDE_CODE_VERSION: latest
        GIT_DELTA_VERSION: "0.18.2"
        ZSH_IN_DOCKER_VERSION: "1.2.0"
        GLAB_VERSION: "1.86.0"
        # Proxy settings for build time (uncomment if behind a corporate proxy)
        # HTTP_PROXY: ${HTTP_PROXY:-}
        # HTTPS_PROXY: ${HTTPS_PROXY:-}
        # NO_PROXY: ${NO_PROXY:-}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      litellm:
        condition: service_healthy
    environment:
      - ANTHROPIC_BASE_URL=http://litellm:4000
      - ANTHROPIC_AUTH_TOKEN=${LITELLM_MASTER_KEY}
      - ANTHROPIC_MODEL=gpt-4o
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      - NODE_OPTIONS=--max-old-space-size=4096
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      # External GitLab settings
      - GITLAB_HOST=${GITLAB_HOST:-}
      - GITLAB_TOKEN=${GITLAB_PERSONAL_ACCESS_TOKEN:-}
      - ENABLE_FIREWALL=${ENABLE_FIREWALL:-true}
      - HOST_WORKSPACE_PATH=${PWD}/workspace
      # Proxy settings (uncomment if behind a corporate proxy)
      # - HTTP_PROXY=${HTTP_PROXY:-}
      # - HTTPS_PROXY=${HTTPS_PROXY:-}
      # - NO_PROXY=${NO_PROXY:-}
      # - http_proxy=${HTTP_PROXY:-}
      # - https_proxy=${HTTPS_PROXY:-}
      # - no_proxy=${NO_PROXY:-}
    volumes:
      - ./workspace:/workspace
      - claude-config:/home/node/.claude
      - bash-history:/commandhistory
      - /var/run/docker.sock:/var/run/docker.sock
    user: node
    working_dir: /workspace
    stdin_open: true
    tty: true
    networks:
      - default

  openhands:
    image: ghcr.io/openhands/openhands:latest
    profiles:
      - openhands
    ports:
      - "3000:3000"
    environment:
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=ghcr.io/openhands/runtime:1.1-nikolaik
      - WORKSPACE_MOUNT_PATH=${OPENHANDS_WORKSPACE_MOUNT_PATH:-/Users/tsuchitakouji/pg_work_space/m_poc/workspace-openhands}
      # Proxy settings (uncomment if behind a corporate proxy)
      # - HTTP_PROXY=${HTTP_PROXY:-}
      # - HTTPS_PROXY=${HTTPS_PROXY:-}
      # - NO_PROXY=${NO_PROXY:-}
      # - http_proxy=${HTTP_PROXY:-}
      # - https_proxy=${HTTPS_PROXY:-}
      # - no_proxy=${NO_PROXY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - openhands-config:/root/.openhands
      - ./workspace-openhands:/opt/workspace_base
    depends_on:
      litellm:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    tty: true
    stdin_open: true
    networks:
      - default

networks:
  default:
    driver: bridge

volumes:
  claude-config:
  bash-history:
  openhands-config:
