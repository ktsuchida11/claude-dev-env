# Supply Chain Security: uv configuration
# See: https://docs.astral.sh/uv/reference/settings/#exclude-newer

# クールダウン: 公開から7日未満のバージョンをブロック（相対期間指定）
# uv 0.9.17+ で duration 形式に対応。定期更新不要。
#
# 緊急バイパス:
#   uv add <pkg> --exclude-newer "0 days"
exclude-newer = "7 days"

[pip]
# レジストリを公式 PyPI のみに固定（dependency confusion 対策）
index-url = "https://pypi.org/simple/"
extra-index-url = []
