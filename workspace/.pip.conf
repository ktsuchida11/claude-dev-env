# Supply Chain Security: pip configuration
# See: https://pip.pypa.io/en/stable/cli/pip_install/

[global]
# レジストリを公式 PyPI のみに固定（dependency confusion 対策）
index-url = https://pypi.org/simple/
# 追加レジストリを無効化
no-extra-index-url = true

# クールダウン: 指定日時より前にアップロードされたバージョンのみインストール可能（pip v26.0+）
# pip は相対日付（P7D等）に未対応のため、絶対日付で指定する
# この値は定期的に更新するか、コマンドラインで上書きすること:
#   pip install --uploaded-prior-to=$(date -d '-7days' -Idate) <package>
uploaded-prior-to = 2026-04-17
