# Supply Chain Security: pip configuration
# See: https://pip.pypa.io/en/stable/cli/pip_install/

[global]
# レジストリを公式 PyPI のみに固定（dependency confusion 対策）
index-url = https://pypi.org/simple/
# 追加レジストリを無効化
no-extra-index-url = true

# クールダウン: 指定日時より前にアップロードされたバージョンのみインストール可能（pip v26.1+）
# ISO 8601 期間形式（例: P7D = 7日）に対応 — 相対値のため定期更新は不要
uploaded-prior-to = P7D
