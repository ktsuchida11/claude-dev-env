name: MCP version auto-update

on:
  schedule:
    # 毎週月曜 09:00 JST (= 00:00 UTC) に実行
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: mcp-version-auto-update
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # PR 作成のため fetch-depth 0 で履歴を取得
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Resolve cooldown-eligible MCP versions
        id: bump
        run: python3 .github/scripts/mcp-version-bump.py

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          fi

      - name: Configure git identity
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push to update branch
        if: steps.diff.outputs.changed == 'true'
        env:
          C7: ${{ steps.bump.outputs.context7 }}
          PW: ${{ steps.bump.outputs.playwright }}
          SERENA_TAG: ${{ steps.bump.outputs.serena_tag }}
          SERENA_SHA: ${{ steps.bump.outputs.serena_sha }}
        run: |
          BRANCH="chore/mcp-auto-update"
          git checkout -B "$BRANCH"
          git add .devcontainer/mcp-servers.json .devcontainer/Dockerfile README.md
          git commit -m "chore(mcp): bump versions (context7=${C7}, playwright=${PW}, serena=${SERENA_TAG})"
          git push --force-with-lease origin "$BRANCH"

      - name: Create or update pull request
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          C7: ${{ steps.bump.outputs.context7 }}
          PW: ${{ steps.bump.outputs.playwright }}
          SERENA_TAG: ${{ steps.bump.outputs.serena_tag }}
          SERENA_SHA: ${{ steps.bump.outputs.serena_sha }}
        run: |
          BRANCH="chore/mcp-auto-update"
          BODY=$(cat <<EOF
          ## Summary

          MCP サーバーの pin を 7 日クールダウンを満たす最新版に自動更新。

          | MCP | 新しい pin |
          |---|---|
          | context7 | \`@upstash/context7-mcp@${C7}\` |
          | playwright | \`@playwright/mcp@${PW}\` |
          | serena | commit \`${SERENA_SHA}\`（${SERENA_TAG} 相当）|

          ## レビュー観点

          - [ ] 公開後 7 日以上経過した版か（npm view <pkg> time --json で確認）
          - [ ] CHANGELOG / リリースノートに不審な変更がないか
          - [ ] DevContainer 再ビルド後に \`/mcp\` で 3 サーバーが起動する

          ---

          🤖 Auto-generated by \`.github/workflows/mcp-version-update.yml\`
          EOF
          )

          if gh pr view "$BRANCH" --json url --jq .url 2>/dev/null; then
            gh pr edit "$BRANCH" --body "$BODY" --title "chore(mcp): auto-update MCP versions"
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore(mcp): auto-update MCP versions" \
              --body "$BODY"
          fi
