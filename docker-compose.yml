services:
  # Docker Socket Proxy: dev から /var/run/docker.sock を直接マウントする代わりに、
  # tecnativa/docker-socket-proxy を介して必要最小限の API だけを公開する。
  # 直接マウントはコンテナエスケープの王道経路（--privileged で任意コンテナ起動可）
  # のため、許可 API を絞った経路に置き換えてホスト root 掌握リスクを縮小する。
  docker-proxy:
    # SHA256 digest で pin（litellm と同様のサプライチェーン対策）
    # 更新手順:
    #   docker pull tecnativa/docker-socket-proxy:v0.4.2 && \
    #     docker inspect --format='{{index .RepoDigests 0}}' tecnativa/docker-socket-proxy:v0.4.2
    image: tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /run
      - /tmp:size=8m,mode=1777
    environment:
      # 許可 API（dev の用途: docker compose / build / exec / ps など）
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      SERVICES: 1
      TASKS: 1
      EXEC: 1
      BUILD: 1
      INFO: 1
      PING: 1
      VERSION: 1
      POST: 1
      # 危険な API はデフォルト 0 のまま無効化
      # AUTH, SECRETS, SWARM, SYSTEM(prune), CONFIGS, PLUGINS, NODES, DISTRIBUTION, SESSION
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    mem_limit: 64m
    memswap_limit: 64m
    cpus: 0.2
    pids_limit: 64

  litellm:
    build:
      context: ./litellm
    ports:
      # ホスト側ポートは LITELLM_HOST_PORT で上書き可能（複数プロジェクト同時実行用）
      # LAN 上の他ホストから到達できないよう 127.0.0.1 にバインドする
      - "127.0.0.1:${LITELLM_HOST_PORT:-4000}:4000"
    env_file:
      - path: .env
        required: false
    mem_limit: ${LITELLM_MEM_LIMIT:-1g}
    memswap_limit: ${LITELLM_MEMSWAP_LIMIT:-1g}
    cpus: ${LITELLM_CPUS:-1.0}
    pids_limit: ${LITELLM_PIDS_LIMIT:-256}
    # ルート FS を read-only 化し、runtime 改ざん面を削減。
    # Python プロセスが必要とする書き込み先（一時ファイル等）は tmpfs で提供する。
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    # Proxy settings (uncomment if behind a corporate proxy)
    # NOTE: 大文字の HTTP_PROXY/HTTPS_PROXY/NO_PROXY は env_file (.env) 経由で
    # 自動的に読み込まれるため、ここでは小文字のみ追加する
    # environment:
    #   - http_proxy=${HTTP_PROXY:-}
    #   - https_proxy=${HTTPS_PROXY:-}
    #   - no_proxy=${NO_PROXY:-}

  dev:
    build:
      context: ./.devcontainer
      args:
        TZ: Asia/Tokyo
        GIT_DELTA_VERSION: "0.18.2"
        ZSH_IN_DOCKER_VERSION: "1.2.0"
        ENABLE_JAVA: "${ENABLE_JAVA:-true}"
        # HTTP_PROXY: ${HTTP_PROXY:-}
        # HTTPS_PROXY: ${HTTPS_PROXY:-}
        # NO_PROXY: ${NO_PROXY:-}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # seccomp は Docker デフォルトを使用（unconfined は撤回）
    # NET_ADMIN / NET_RAW が付与されていれば iptables/ipset はデフォルト seccomp で動作する
    # 初期化に失敗する場合は ENABLE_FIREWALL=false で切り分け可能
    mem_limit: ${DEV_MEM_LIMIT:-8g}
    memswap_limit: ${DEV_MEMSWAP_LIMIT:-8g}
    cpus: ${DEV_CPUS:-4.0}
    pids_limit: ${DEV_PIDS_LIMIT:-2048}
    healthcheck:
      test: ["CMD", "command", "-v", "claude"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      litellm:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    environment:
      - LITELLM_BASE_URL=http://litellm:4000
      # docker / docker compose は docker-proxy 経由で実行（socket 直接マウントを廃止）
      - DOCKER_HOST=tcp://docker-proxy:2375
      - LITELLM_AUTH_TOKEN=${LITELLM_MASTER_KEY}
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      - NODE_OPTIONS=--max-old-space-size=4096
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - ENABLE_FIREWALL=${ENABLE_FIREWALL:-true}
      # host.docker.internal 経由でホスト側サービスへアクセスを許可するポート
      - FIREWALL_ALLOWED_PORTS=${FIREWALL_ALLOWED_PORTS:-443,80}
      # .env 暗号化: age 秘密鍵は tmpfs 経由で渡す（環境変数に残さない）
      # start-devcontainer.sh が docker cp で /run/secrets/age-key に注入 → 復号後に削除
      - HOST_WORKSPACE_PATH=${PWD}/workspace
      # Supply Chain Guard (set ENABLE_SUPPLY_CHAIN_GUARD=false in .env to disable)
      - ENABLE_SUPPLY_CHAIN_GUARD=${ENABLE_SUPPLY_CHAIN_GUARD:-true}
      # LangFuse tracing for Claude Code hook (set TRACE_TO_LANGFUSE=true in .env to enable)
      # CC_LANGFUSE_* は Claude Code Hook 専用。アプリ側の LANGFUSE_* と競合しない
      - TRACE_TO_LANGFUSE=${TRACE_TO_LANGFUSE:-false}
      - CC_LANGFUSE_PUBLIC_KEY=${CC_LANGFUSE_PUBLIC_KEY:-}
      - CC_LANGFUSE_SECRET_KEY=${CC_LANGFUSE_SECRET_KEY:-}
      - CC_LANGFUSE_BASE_URL=${CC_LANGFUSE_BASE_URL:-}
      - CC_LANGFUSE_DEBUG=${CC_LANGFUSE_DEBUG:-false}
      # アプリ用 LangFuse（LANGFUSE_*）はここで設定しない。
      # docker-compose で空文字を注入すると、アプリ側 .env の値を上書きしてしまうため。
      # アプリの .env または docker-compose.override.yml で直接設定すること。
      # Proxy settings (uncomment if behind a corporate proxy)
      # - HTTP_PROXY=${HTTP_PROXY:-}
      # - HTTPS_PROXY=${HTTPS_PROXY:-}
      # - NO_PROXY=${NO_PROXY:-}
      # - http_proxy=${HTTP_PROXY:-}
      # - https_proxy=${HTTPS_PROXY:-}
      # - no_proxy=${NO_PROXY:-}
    tmpfs:
      - /run/secrets:size=1m,mode=700,uid=1000,gid=1000
    volumes:
      - ./workspace:/workspace:delegated
      - ./.claude:/workspace/.claude-source:ro
      - ./cooldown_management:/workspace/cooldown_management:ro
      - claude-config:/home/node/.claude
      - bash-history:/commandhistory
    user: node
    working_dir: /workspace
    stdin_open: true
    tty: true

volumes:
  claude-config:
  bash-history:
