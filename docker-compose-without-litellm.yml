services:
  # Docker Socket Proxy: dev から /var/run/docker.sock を直接マウントする代わりに、
  # tecnativa/docker-socket-proxy を介して必要最小限の API だけを公開する。
  # 詳細は docker-compose.yml の同名サービス参照。
  docker-proxy:
    # SHA256 digest で pin（詳細は docker-compose.yml の同名サービス参照）
    image: tecnativa/docker-socket-proxy:v0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /run
      - /tmp:size=8m,mode=1777
    environment:
      CONTAINERS: 1
      IMAGES: 1
      NETWORKS: 1
      VOLUMES: 1
      SERVICES: 1
      TASKS: 1
      EXEC: 1
      BUILD: 1
      INFO: 1
      PING: 1
      VERSION: 1
      POST: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    mem_limit: 64m
    memswap_limit: 64m
    cpus: 0.2
    pids_limit: 64

  dev:
    build:
      context: ./.devcontainer
      args:
        TZ: Asia/Tokyo
        CLAUDE_CODE_VERSION: latest
        GIT_DELTA_VERSION: "0.18.2"
        ZSH_IN_DOCKER_VERSION: "1.2.0"
        ENABLE_JAVA: "${ENABLE_JAVA:-false}"
        # HTTP_PROXY: ${HTTP_PROXY:-}
        # HTTPS_PROXY: ${HTTPS_PROXY:-}
        # NO_PROXY: ${NO_PROXY:-}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    mem_limit: ${DEV_MEM_LIMIT:-8g}
    memswap_limit: ${DEV_MEMSWAP_LIMIT:-8g}
    cpus: ${DEV_CPUS:-4.0}
    pids_limit: ${DEV_PIDS_LIMIT:-2048}
    healthcheck:
      test: ["CMD", "command", "-v", "claude"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      docker-proxy:
        condition: service_started
    environment:
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      - NODE_OPTIONS=--max-old-space-size=4096
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - ENABLE_FIREWALL=${ENABLE_FIREWALL:-true}
      # Dockerfile cooldown PreToolUse block (opt-in, default false = warning only)
      - ENABLE_DOCKERFILE_COOLDOWN_BLOCK=${ENABLE_DOCKERFILE_COOLDOWN_BLOCK:-false}
      # python -c / node -e 経由 egress を強制 block (opt-in, default false = warning only)
      - STRICT_EGRESS_BLOCK=${STRICT_EGRESS_BLOCK:-false}
      - HOST_WORKSPACE_PATH=${PWD}/workspace
      # docker / docker compose は docker-proxy 経由で実行（socket 直接マウントを廃止）
      - DOCKER_HOST=tcp://docker-proxy:2375
      # .env 暗号化: age 秘密鍵は tmpfs 経由で渡す（環境変数に残さない）
      # start-devcontainer.sh が docker cp で /run/secrets/age-key に注入 → 復号後に削除
      # Proxy settings (uncomment if behind a corporate proxy)
      # - HTTP_PROXY=${HTTP_PROXY:-}
      # - HTTPS_PROXY=${HTTPS_PROXY:-}
      # - NO_PROXY=${NO_PROXY:-}
      # - http_proxy=${HTTP_PROXY:-}
      # - https_proxy=${HTTPS_PROXY:-}
      # - no_proxy=${NO_PROXY:-}
    tmpfs:
      - /run/secrets:size=1m,mode=700,uid=1000,gid=1000
    volumes:
      - ./workspace:/workspace:delegated
      - ./.claude:/workspace/.claude-source:ro
      - ./cooldown_management:/workspace/cooldown_management:ro
      - claude-config:/home/node/.claude
      - bash-history:/commandhistory
    user: node
    working_dir: /workspace
    stdin_open: true
    tty: true

volumes:
  claude-config:
  bash-history:
  frontend-node-modules:
  backend-venv:
