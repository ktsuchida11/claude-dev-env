services:
  dev:
    build:
      context: ./.devcontainer
      args:
        TZ: Asia/Tokyo
        CLAUDE_CODE_VERSION: latest
        GIT_DELTA_VERSION: "0.18.2"
        ZSH_IN_DOCKER_VERSION: "1.2.0"
        # HTTP_PROXY: ${HTTP_PROXY:-}
        # HTTPS_PROXY: ${HTTPS_PROXY:-}
        # NO_PROXY: ${NO_PROXY:-}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    healthcheck:
      test: ["CMD", "command", "-v", "claude"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      - NODE_OPTIONS=--max-old-space-size=4096
      - CLAUDE_CONFIG_DIR=/home/node/.claude
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - ENABLE_FIREWALL=${ENABLE_FIREWALL:-true}
      - HOST_WORKSPACE_PATH=${PWD}/workspace
      # .env жҡ—еҸ·еҢ–: age з§ҳеҜҶйҚөгҒҜ tmpfs зөҢз”ұгҒ§жёЎгҒҷпјҲз’°еўғеӨүж•°гҒ«ж®ӢгҒ•гҒӘгҒ„пјү
      # start-devcontainer.sh гҒҢ docker cp гҒ§ /run/secrets/age-key гҒ«жіЁе…Ҙ вҶ’ еҫ©еҸ·еҫҢгҒ«еүҠйҷӨ
      # Proxy settings (uncomment if behind a corporate proxy)
      # - HTTP_PROXY=${HTTP_PROXY:-}
      # - HTTPS_PROXY=${HTTPS_PROXY:-}
      # - NO_PROXY=${NO_PROXY:-}
      # - http_proxy=${HTTP_PROXY:-}
      # - https_proxy=${HTTPS_PROXY:-}
      # - no_proxy=${NO_PROXY:-}
    tmpfs:
      - /run/secrets:size=1m,mode=700,uid=1000,gid=1000
    volumes:
      - ./workspace:/workspace:delegated
      - ./.claude:/workspace/.claude-source:ro
      - ./cooldown_management:/workspace/cooldown_management:ro
      - claude-config:/home/node/.claude
      - bash-history:/commandhistory
      - /var/run/docker.sock:/var/run/docker.sock
    user: node
    working_dir: /workspace
    stdin_open: true
    tty: true

volumes:
  claude-config:
  bash-history:
  frontend-node-modules:
  backend-venv:
