model_list:
  # ========== Phase 1: OpenAI ==========
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # ========== Anthropic (直接接続) ==========
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-opus-4-6
      api_key: os.environ/ANTHROPIC_API_KEY


  # ========== Phase 2: Azure OpenAI ==========
  # model フィールドは azure/<デプロイメント名> の形式
  # .env の AZURE_DEPLOYMENT_NAME の値に置き換えて使用
  - model_name: azure-gpt
    litellm_params:
      model: azure/gpt-5-mini
      api_key: os.environ/AZURE_API_KEY
      api_base: os.environ/AZURE_API_BASE
      api_version: os.environ/AZURE_API_VERSION

  # ========== Phase 3: Azure Databricks (Claude External Model) ==========
  # Databricks の External Model 機能で Anthropic API をプロキシ
  # エンドポイント名は Databricks Serving で作成した名前に置き換え
  - model_name: db-claude-sonnet-4-5
    litellm_params:
      model: databricks/claude-sonnet-4-5
      api_key: os.environ/DATABRICKS_API_KEY
      api_base: os.environ/DATABRICKS_API_BASE

  - model_name: db-claude-sonnet-4-6
    litellm_params:
      model: databricks/claude-sonnet-4-6
      api_key: os.environ/DATABRICKS_API_KEY
      api_base: os.environ/DATABRICKS_API_BASE
      
  - model_name: db-claude-opus-4-6
    litellm_params:
      model: databricks/claude-opus-4-6
      api_key: os.environ/DATABRICKS_API_KEY
      api_base: os.environ/DATABRICKS_API_BASE

litellm_settings:
  drop_params: true
  num_retries: 2
  request_timeout: 120

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
